<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>DayTracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#eee;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Top bar */
.top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#111;border-bottom:1px solid #1e1e1e;z-index:100;flex-shrink:0}
.top h1{font-size:1rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-pills{display:flex;gap:6px;align-items:center}
.pill{background:#1a1a1a;border:1px solid #222;border-radius:14px;padding:4px 10px;font-size:.72rem;color:#888;font-weight:600}
.pill.live{color:#4ade80;border-color:#2d5d2d;background:#0d1f0d}
.pill.live::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80;margin-right:5px;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Date nav */
.date-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 14px;background:#111;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.date-nav button{background:none;border:none;color:#555;font-size:1.2rem;cursor:pointer;padding:4px 8px}
.date-nav button:hover{color:#aaa}
.date-label{font-size:.82rem;font-weight:600;color:#ccc;min-width:160px;text-align:center}

/* Map */
#map{flex:1;background:#111;z-index:1}
.leaflet-control-attribution{display:none!important}

/* Bottom controls */
.bottom{display:flex;gap:8px;padding:10px 14px;background:#111;border-top:1px solid #1e1e1e;flex-shrink:0;z-index:100}
.btn{flex:1;padding:12px 8px;border-radius:10px;border:1px solid #222;background:#1a1a1a;color:#ccc;font-size:.78rem;font-weight:600;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:active{background:#252525}
.btn.accent{background:#1a1f3d;color:#60a5fa;border-color:#2a3050}
.btn.purple{background:#1f1a3d;color:#a78bfa;border-color:#302a50}

/* Playback bar */
.playback{display:none;padding:10px 14px;background:#0d0d15;border-top:1px solid #1a1a2a;flex-shrink:0;z-index:100}
.playback.show{display:block}
.pb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pb-time{font-size:1.1rem;font-weight:800;color:#60a5fa;font-variant-numeric:tabular-nums}
.pb-place{font-size:.75rem;color:#888;max-width:200px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pb-mph{font-size:.7rem;color:#4ade80;font-weight:700;font-variant-numeric:tabular-nums}
.pb-controls{display:flex;gap:8px;align-items:center}
.pb-btn{background:none;border:none;color:#888;font-size:1.1rem;cursor:pointer;padding:4px}
.pb-btn.active{color:#60a5fa}
.pb-speed{background:#1a1a2a;border:1px solid #2a2a3a;border-radius:12px;padding:2px 8px;color:#60a5fa;font-size:.7rem;font-weight:700;cursor:pointer}
.pb-progress{width:100%;height:4px;background:#1a1a2a;border-radius:2px;margin-top:6px;cursor:pointer;position:relative}
.pb-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#a78bfa);border-radius:2px;transition:width .3s linear}

/* Photo popup */
.photo-popup{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);z-index:200;background:#111;border:1px solid #2a2a2a;border-radius:14px;padding:8px;box-shadow:0 8px 32px rgba(0,0,0,.6);max-width:280px;display:none;animation:popIn .3s ease}
.photo-popup.show{display:block}
.photo-popup img{width:100%;border-radius:10px;max-height:200px;object-fit:cover}
.photo-popup .meta{padding:6px 4px 2px;font-size:.72rem;color:#888}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(20px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* Stats overlay */
.stats-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);overflow-y:auto;display:none}
.stats-overlay.show{display:block}
.stats-inner{max-width:460px;margin:0 auto;padding:20px 16px 40px}
.stats-inner h2{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats-inner .sub{font-size:.78rem;color:#555;margin-bottom:16px}
.close-btn{position:fixed;top:12px;right:12px;z-index:301;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sc{background:#161616;border-radius:10px;padding:14px 8px;text-align:center;border:1px solid #1e1e1e}
.sc .v{font-size:1.4rem;font-weight:800;color:#fff}
.sc .l{font-size:.62rem;color:#555;margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.stop-card{background:#161616;border:1px solid #1e1e1e;border-radius:10px;padding:12px;display:flex;gap:10px;margin-bottom:6px}
.stop-card .icon{width:32px;height:32px;border-radius:8px;background:rgba(124,58,237,.15);color:#a78bfa;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.stop-card h4{font-size:.82rem;font-weight:600;color:#ccc}
.stop-card p{font-size:.7rem;color:#555;margin-top:1px}
.stop-card .photos{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.stop-card .photos img{width:44px;height:44px;border-radius:6px;object-fit:cover;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:400;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:8px 18px;font-size:.78rem;color:#ccc;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Lightbox */
.lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;cursor:pointer}
.lightbox img{max-width:95%;max-height:88vh;border-radius:8px;object-fit:contain}

input[type="file"]{display:none}

/* Calendar overlay */
.cal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:350;background:rgba(0,0,0,.92);backdrop-filter:blur(14px);display:none;overflow-y:auto}
.cal-overlay.show{display:block}
.cal-inner{max-width:380px;margin:0 auto;padding:16px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-header h2{font-size:1.1rem;font-weight:700;color:#eee}
.cal-header button{background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;padding:4px 8px}
.cal-header button:hover{color:#fff}
.cal-month{text-align:center;font-size:.9rem;font-weight:700;color:#ccc;margin-bottom:8px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-weekdays span{text-align:center;font-size:.6rem;color:#555;font-weight:600;text-transform:uppercase;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;background:#161616;border:1px solid transparent;position:relative;transition:all .15s}
.cal-day:hover{background:#222}
.cal-day.empty{background:transparent;cursor:default}
.cal-day.today{border-color:#60a5fa}
.cal-day.selected{background:#1a1f3d;border-color:#60a5fa}
.cal-day.has-data{background:#0d1f0d;border-color:#1a3a1a}
.cal-day.has-data:hover{background:#142e14}
.cal-day .d-num{font-size:.82rem;font-weight:600;color:#888}
.cal-day.has-data .d-num{color:#4ade80}
.cal-day.today .d-num{color:#60a5fa}
.cal-day .d-dots{display:flex;gap:2px;margin-top:2px}
.cal-day .d-dots span{width:4px;height:4px;border-radius:50%}
.cal-day .dot-path{background:#60a5fa}
.cal-day .dot-photo{background:#f59e0b}
.cal-day .dot-stops{background:#a78bfa}
.date-label{cursor:pointer}
.date-label:hover{color:#60a5fa}
</style>
</head>
<body>

<div class="top">
  <h1>DayTracker</h1>
  <div class="top-pills">
    <div class="pill" id="distPill">0 mi</div>
    <div class="pill" id="stopsPill">0 stops</div>
    <div class="pill live" id="livePill">Live</div>
  </div>
</div>

<div class="date-nav">
  <button id="prevDay">◀</button>
  <div class="date-label" id="dateLabel"></div>
  <button id="nextDay">▶</button>
</div>

<div id="map"></div>

<!-- Photo popup during playback -->
<div class="photo-popup" id="photoPopup">
  <img id="popupImg" src="">
  <div class="meta" id="popupMeta"></div>
</div>

<!-- Playback bar -->
<div class="playback" id="playbar">
  <div class="pb-top">
    <div class="pb-time" id="pbTime">--:--</div>
    <div class="pb-mph" id="pbMph"></div>
    <div class="pb-place" id="pbPlace"></div>
    <div class="pb-controls">
      <button class="pb-btn" id="pbPrev">⏮</button>
      <button class="pb-btn active" id="pbPlay" style="font-size:1.4rem">⏸</button>
      <button class="pb-btn" id="pbNext">⏭</button>
      <button class="pb-speed" id="pbSpeed">2x</button>
    </div>
  </div>
  <div class="pb-progress" id="pbProgress"><div class="pb-fill" id="pbFill"></div></div>
</div>

<!-- Bottom controls -->
<div class="bottom" id="bottomBar">
  <button class="btn accent" id="playBtn">▶ Play My Day</button>
  <button class="btn purple" id="photoBtn">📷 Photos</button>
  <button class="btn" id="calBtn">📅 Calendar</button>
  <button class="btn" id="summaryBtn">📊</button>
</div>

<!-- Calendar overlay -->
<div class="cal-overlay" id="calOv">
  <div class="cal-inner">
    <div class="cal-header">
      <button id="calPrevM">◀</button>
      <h2 id="calTitle"></h2>
      <button id="calNextM">▶</button>
    </div>
    <div class="cal-weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<input type="file" id="fileIn" accept="image/*" multiple>

<!-- Stats overlay -->
<div class="stats-overlay" id="statsOv">
  <button class="close-btn" id="closeStats">&times;</button>
  <div class="stats-inner">
    <h2>Your Day</h2>
    <div class="sub" id="statsDate"></div>
    <div class="sg" id="statsGrid"></div>
    <div id="stopsList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){

/* ── Helpers ── */
var $=function(id){return document.getElementById(id)};
var hav=function(a,b,c,d){var R=6371e3,f=a*Math.PI/180,g=c*Math.PI/180,df=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180,x=Math.sin(df/2)*Math.sin(df/2)+Math.cos(f)*Math.cos(g)*Math.sin(dl/2)*Math.sin(dl/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))};
var fmtTime=function(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})};
var fmtDur=function(ms){var m=Math.round(ms/60000);if(m<60)return m+'m';var h=Math.floor(m/60);return h+'h'+(m%60?' '+(m%60)+'m':'')};
var toMi=function(m){return(m*0.000621371).toFixed(1)};
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2500)}

/* ── State ── */
var viewDate=new Date();
var today=function(){return new Date().toISOString().slice(0,10)};
var dateKey=function(d){return d.toISOString().slice(0,10)};
function load(key){try{return JSON.parse(localStorage.getItem('dt_'+key))||blank()}catch(e){return blank()}}
function blank(){return{pts:[],stops:[],photos:[],steps:0,dist:0,curStop:null}}
function save(key,s){localStorage.setItem('dt_'+key,JSON.stringify(s))}
var S=load(today());

/* ── Map ── */
var myMap,pathLine,curMarker,markers=[],photoMarkers=[];
var watchId=null;

function initMap(){
  if(typeof L==='undefined'){setTimeout(initMap,500);return}
  myMap=L.map('map',{zoomControl:false,attributionControl:false}).setView([40.7128,-74.006],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(myMap);
  pathLine=L.polyline([],{color:'#60a5fa',weight:4,opacity:.8}).addTo(myMap);
  renderDay();
  autoTrack();
}

/* ── Auto-track (no button needed) ── */
function autoTrack(){
  if(!navigator.geolocation)return;
  // Only track if viewing today
  watchId=navigator.geolocation.watchPosition(function(pos){
    var lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;
    if(acc>100)return;
    var ts=Date.now();
    if(S.pts.length>0){
      var prev=S.pts[S.pts.length-1];
      var d=hav(prev.lat,prev.lng,lat,lng);
      if(d<3)return;
      S.dist+=d;
    }
    S.pts.push({lat:lat,lng:lng,ts:ts});
    detectStop(lat,lng,ts);
    save(today(),S);
    // Update map if viewing today
    if(dateKey(viewDate)===today()){
      renderPath();
      if(curMarker)curMarker.setLatLng([lat,lng]);
      else{
        var ic=L.divIcon({className:'',html:'<div style="width:14px;height:14px;border-radius:50%;background:#60a5fa;border:3px solid #fff;box-shadow:0 0 0 6px rgba(96,165,250,.25)"></div>',iconSize:[14,14],iconAnchor:[7,7]});
        curMarker=L.marker([lat,lng],{icon:ic}).addTo(myMap);
      }
      myMap.panTo([lat,lng],{animate:true});
      updatePills();
    }
  },function(err){
    if(err.code===1)$('livePill').textContent='No GPS';
  },{enableHighAccuracy:true,maximumAge:5000,timeout:10000});
}

/* ── Stop detection ── */
function detectStop(lat,lng,ts){
  var RADIUS=50,MIN=180000;
  if(S.curStop!==null){
    var s=S.stops[S.curStop];
    if(hav(s.lat,s.lng,lat,lng)>RADIUS){
      s.t1=ts;
      if(ts-s.t0<MIN)S.stops.splice(S.curStop,1);
      else geocode(s.lat,s.lng,S.curStop);
      S.curStop=null;
    }
  }else{
    var rec=S.pts.filter(function(p){return ts-p.ts<MIN});
    if(rec.length>=3){
      var cx=0,cy=0;rec.forEach(function(p){cx+=p.lat;cy+=p.lng});cx/=rec.length;cy/=rec.length;
      if(rec.every(function(p){return hav(p.lat,p.lng,cx,cy)<RADIUS})&&ts-rec[0].ts>=MIN){
        S.stops.push({lat:cx,lng:cy,t0:rec[0].ts,t1:null,name:'Stop',pIds:[]});
        S.curStop=S.stops.length-1;
        geocode(cx,cy,S.curStop);
        toast('Stop detected');
      }
    }
  }
}

function geocode(lat,lng,idx){
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lng+'&format=json&zoom=18')
  .then(function(r){return r.json()}).then(function(d){
    if(d.address&&S.stops[idx]){
      var a=d.address;
      S.stops[idx].name=a.amenity||a.shop||a.leisure||a.restaurant||a.cafe||a.road||'Stop';
      save(today(),S);
    }
  }).catch(function(){});
}

/* ── Render ── */
function renderDay(){
  var key=dateKey(viewDate);
  var data=(key===today())?S:load(key);
  renderPath(data);
  renderMarkers(data);
  renderPhotoMarkers(data);
  updatePills(data);
  fitBounds(data);
  // Show/hide live pill
  $('livePill').style.display=(key===today())?'':'none';
}

function renderPath(data){
  if(!myMap||!pathLine)return;
  var d=data||S;
  pathLine.setLatLngs(d.pts.map(function(p){return[p.lat,p.lng]}));
}

function renderMarkers(data){
  if(!myMap)return;
  markers.forEach(function(m){myMap.removeLayer(m)});markers=[];
  var d=data||S;
  d.stops.forEach(function(s,i){
    var ic=L.divIcon({className:'',html:'<div style="width:24px;height:24px;border-radius:50%;background:#7c3aed;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.4)">'+(i+1)+'</div>',iconSize:[24,24],iconAnchor:[12,12]});
    var m=L.marker([s.lat,s.lng],{icon:ic}).addTo(myMap);
    m.bindPopup('<b>'+(s.name||'Stop')+'</b><br>'+fmtTime(s.t0)+(s.t1?' - '+fmtTime(s.t1):''));
    markers.push(m);
  });
}

function renderPhotoMarkers(data){
  if(!myMap)return;
  photoMarkers.forEach(function(m){myMap.removeLayer(m)});photoMarkers=[];
  var d=data||S;
  d.photos.forEach(function(ph){
    var ic=L.divIcon({className:'',html:'<div style="width:26px;height:26px;border-radius:50%;background:#f59e0b;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,.4)">📷</div>',iconSize:[26,26],iconAnchor:[13,13]});
    var m=L.marker([ph.lat,ph.lng],{icon:ic}).addTo(myMap);
    m.bindPopup('<img src="'+ph.d+'" style="width:160px;border-radius:6px"><br><small>'+fmtTime(ph.ts)+'</small>',{maxWidth:200});
    photoMarkers.push(m);
  });
}

function fitBounds(data){
  if(!myMap)return;
  var d=data||S;
  if(d.pts.length>1)myMap.fitBounds(L.latLngBounds(d.pts.map(function(p){return[p.lat,p.lng]})).pad(.12));
  else if(d.pts.length===1)myMap.setView([d.pts[0].lat,d.pts[0].lng],15);
}

function updatePills(data){
  var d=data||S;
  $('distPill').textContent=toMi(d.dist)+' mi';
  $('stopsPill').textContent=d.stops.length+' stops';
}

/* ── Date Navigation ── */
function updateDateLabel(){
  var d=viewDate;
  var t=new Date();
  if(dateKey(d)===dateKey(t))$('dateLabel').textContent='Today — '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  else{
    var y=new Date(t);y.setDate(y.getDate()-1);
    if(dateKey(d)===dateKey(y))$('dateLabel').textContent='Yesterday — '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    else $('dateLabel').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  }
}
updateDateLabel();

$('prevDay').addEventListener('click',function(){
  viewDate.setDate(viewDate.getDate()-1);
  updateDateLabel();renderDay();stopPlayback();
});
$('nextDay').addEventListener('click',function(){
  var tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  if(viewDate>=tomorrow)return;
  viewDate.setDate(viewDate.getDate()+1);
  updateDateLabel();renderDay();stopPlayback();
});

/* ── Smart Photo Dedup ── */
// Groups photos by time (within 5 min) + location (within 200m)
// Keeps only 1 per group (the first one)
function dedupPhotos(photos){
  if(photos.length<=1)return photos;
  photos.sort(function(a,b){return a.ts-b.ts});
  var groups=[];
  var used={};
  for(var i=0;i<photos.length;i++){
    if(used[i])continue;
    var group=[photos[i]];
    used[i]=true;
    for(var j=i+1;j<photos.length;j++){
      if(used[j])continue;
      var timeDiff=Math.abs(photos[j].ts-photos[i].ts);
      var locDiff=(photos[i].lat&&photos[j].lat)?hav(photos[i].lat,photos[i].lng,photos[j].lat,photos[j].lng):0;
      // Same burst: within 5 min AND within 200m (or both have no GPS)
      if(timeDiff<300000&&locDiff<200){
        group.push(photos[j]);
        used[j]=true;
      }
    }
    groups.push(group);
  }
  // Keep 1 photo per group (first one)
  return groups.map(function(g){return g[0]});
}

/* ── Photo Import (reads EXIF GPS + timestamp) ── */
$('photoBtn').addEventListener('click',function(){$('fileIn').click()});

$('fileIn').addEventListener('change',function(e){
  var files=e.target.files;
  if(!files.length)return;
  var pending=[];
  var processed=0;
  var total=files.length;

  Array.from(files).forEach(function(file,fi){
    var reader=new FileReader();
    reader.onload=function(ev){
      var buf=ev.target.result;
      var exif=readExif(new Uint8Array(buf));

      // Compress for storage
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');
        var sc=Math.min(1,600/img.width);
        c.width=img.width*sc;c.height=img.height*sc;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        var dataUrl=c.toDataURL('image/jpeg',.65);

        var lat=exif.lat||0,lng=exif.lng||0;
        var ts=exif.time||file.lastModified||Date.now();

        // If no GPS in EXIF, try to match to nearest tracked point
        var key=dateKey(viewDate);
        var data=(key===today())?S:load(key);
        if(!exif.lat&&data.pts.length){
          var closest=data.pts.reduce(function(best,p){var diff=Math.abs(p.ts-ts);return diff<best.diff?{diff:diff,p:p}:best},{diff:Infinity,p:null});
          if(closest.p){lat=closest.p.lat;lng=closest.p.lng}
        }

        pending.push({id:'p'+Date.now()+'_'+fi,d:dataUrl,lat:lat,lng:lng,ts:ts});
        processed++;

        // All files processed — now dedup and save
        if(processed===total){
          var smart=dedupPhotos(pending);
          var key2=dateKey(viewDate);
          var data2=(key2===today())?S:load(key2);

          smart.forEach(function(photo){
            data2.photos.push(photo);
            // Attach to nearest stop
            if(data2.stops.length){
              var nearStop=null,nearDist=Infinity;
              data2.stops.forEach(function(s,i){
                if(photo.ts>=s.t0&&(!s.t1||photo.ts<=s.t1)){nearStop=i;nearDist=0}
                else{var d2=Math.min(Math.abs(photo.ts-s.t0),Math.abs(photo.ts-(s.t1||photo.ts)));if(d2<nearDist&&d2<300000){nearDist=d2;nearStop=i}}
              });
              if(nearStop!==null){
                if(!data2.stops[nearStop].pIds)data2.stops[nearStop].pIds=[];
                data2.stops[nearStop].pIds.push(photo.id);
              }
            }
          });

          save(key2,data2);
          if(key2===today())S=data2;
          renderDay();
          var msg=total>smart.length?
            smart.length+' unique photo'+(smart.length!==1?'s':'')+' added ('+( total-smart.length)+' similar filtered out)':
            smart.length+' photo'+(smart.length!==1?'s':'')+' added';
          toast(msg);
        }
      };
      img.src=URL.createObjectURL(file);
    };
    reader.readAsArrayBuffer(file);
  });
  e.target.value='';
});

/* ── Minimal EXIF GPS reader ── */
function readExif(data){
  var result={lat:null,lng:null,time:null};
  if(data[0]!==0xFF||data[1]!==0xD8)return result; // not JPEG
  var offset=2;
  while(offset<data.length-1){
    if(data[offset]!==0xFF)break;
    var marker=data[offset+1];
    if(marker===0xE1){// APP1/EXIF
      var len=(data[offset+2]<<8)|data[offset+3];
      var exifData=data.slice(offset+4,offset+2+len);
      if(String.fromCharCode.apply(null,exifData.slice(0,4))==='Exif'){
        parseExifBlock(exifData.slice(6),result);
      }
      break;
    }
    var segLen=(data[offset+2]<<8)|data[offset+3];
    offset+=2+segLen;
  }
  return result;
}

function parseExifBlock(data,result){
  var le=data[0]===0x49; // little endian
  var r2=function(o){return le?(data[o]|data[o+1]<<8):(data[o]<<8|data[o+1])};
  var r4=function(o){return le?(data[o]|data[o+1]<<8|data[o+2]<<16|data[o+3]<<24):(data[o]<<24|data[o+1]<<16|data[o+2]<<8|data[o+3])};

  var ifdOff=r4(4);
  var numEntries=r2(ifdOff);
  var gpsOff=0,exifOff=0;

  for(var i=0;i<numEntries;i++){
    var eOff=ifdOff+2+i*12;
    var tag=r2(eOff);
    if(tag===0x8825)gpsOff=r4(eOff+8); // GPS IFD
    if(tag===0x8769)exifOff=r4(eOff+8); // EXIF IFD
  }

  // Read GPS
  if(gpsOff){
    var gn=r2(gpsOff);
    var latRef='N',lngRef='E',latVals=null,lngVals=null;
    for(var i=0;i<gn;i++){
      var eo=gpsOff+2+i*12;
      var gt=r2(eo);
      if(gt===1)latRef=String.fromCharCode(data[eo+8]); // N or S
      if(gt===3)lngRef=String.fromCharCode(data[eo+8]); // E or W
      if(gt===2){var vo=r4(eo+8);latVals=readRationals(data,vo,3,le)} // Latitude
      if(gt===4){var vo2=r4(eo+8);lngVals=readRationals(data,vo2,3,le)} // Longitude
    }
    if(latVals&&lngVals){
      result.lat=latVals[0]+latVals[1]/60+latVals[2]/3600;
      result.lng=lngVals[0]+lngVals[1]/60+lngVals[2]/3600;
      if(latRef==='S')result.lat=-result.lat;
      if(lngRef==='W')result.lng=-result.lng;
    }
  }

  // Read DateTime from EXIF IFD
  if(exifOff){
    var en=r2(exifOff);
    for(var i=0;i<en;i++){
      var eo2=exifOff+2+i*12;
      var et=r2(eo2);
      if(et===0x9003||et===0x9004){ // DateTimeOriginal or DateTimeDigitized
        var strOff=r4(eo2+8);
        var str='';for(var j=0;j<19;j++)str+=String.fromCharCode(data[strOff+j]);
        // "2024:01:15 14:30:00" -> Date
        var parts=str.split(' ');
        if(parts.length===2){
          var dp=parts[0].replace(/:/g,'-');
          result.time=new Date(dp+'T'+parts[1]).getTime();
        }
        break;
      }
    }
  }
}

function readRationals(data,offset,count,le){
  var r4=function(o){return le?(data[o]|data[o+1]<<8|data[o+2]<<16|data[o+3]<<24):(data[o]<<24|data[o+1]<<16|data[o+2]<<8|data[o+3])};
  var vals=[];
  for(var i=0;i<count;i++){
    var num=r4(offset+i*8);
    var den=r4(offset+i*8+4);
    vals.push(den?num/den:0);
  }
  return vals;
}

/* ── Speed & Direction Helpers ── */
function calcSpeed(p1,p2){
  // Returns speed in mph between two GPS points
  var d=hav(p1.lat,p1.lng,p2.lat,p2.lng); // meters
  var dt=(p2.ts-p1.ts)/1000; // seconds
  if(dt<=0)return 0;
  var mps=d/dt;
  return mps*2.23694; // m/s to mph
}

function calcBearing(p1,p2){
  // Returns bearing in degrees (0=N, 90=E, 180=S, 270=W)
  var dLon=(p2.lng-p1.lng)*Math.PI/180;
  var lat1=p1.lat*Math.PI/180;
  var lat2=p2.lat*Math.PI/180;
  var y=Math.sin(dLon)*Math.cos(lat2);
  var x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  var brng=Math.atan2(y,x)*180/Math.PI;
  return(brng+360)%360;
}

function getVehicle(mph){
  // Returns emoji + label based on speed
  if(mph<0.5) return{icon:'📍',label:'Stopped',size:36};
  if(mph<4)   return{icon:'🚶',label:Math.round(mph)+' mph',size:36};
  if(mph<15)  return{icon:'🚴',label:Math.round(mph)+' mph',size:38};
  if(mph<60)  return{icon:'🚗',label:Math.round(mph)+' mph',size:42};
  return{icon:'🚗',label:Math.round(mph)+' mph',size:42};
}

function makeVehicleIcon(emoji,size,rotation){
  return L.divIcon({
    className:'',
    html:'<div style="font-size:'+size+'px;transform:rotate('+(rotation-90)+'deg);filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));transition:transform .15s ease;line-height:1">'+emoji+'</div>',
    iconSize:[size,size],
    iconAnchor:[size/2,size/2]
  });
}

/* ── Animated Playback ── */
var playing=false,pbTimer=null,pbIndex=0,pbAnimMarker=null,pbAnimLine=null,pbTrailLine=null;
var speeds=[1,2,5,10,20];
var speedIdx=1;
var pbData=null;
var lastVehicleType='';
var lastBearing=0;

$('playBtn').addEventListener('click',startPlayback);
$('pbPlay').addEventListener('click',function(){playing?pausePlayback():resumePlayback()});
$('pbSpeed').addEventListener('click',function(){speedIdx=(speedIdx+1)%speeds.length;$('pbSpeed').textContent=speeds[speedIdx]+'x'});
$('pbPrev').addEventListener('click',function(){pbIndex=Math.max(0,pbIndex-20);renderFrame()});
$('pbNext').addEventListener('click',function(){pbIndex=Math.min((pbData?pbData.pts.length:1)-1,pbIndex+20);renderFrame()});

$('pbProgress').addEventListener('click',function(e){
  if(!pbData)return;
  var rect=this.getBoundingClientRect();
  var pct=(e.clientX-rect.left)/rect.width;
  pbIndex=Math.round(pct*(pbData.pts.length-1));
  renderFrame();
});

function startPlayback(){
  var key=dateKey(viewDate);
  pbData=(key===today())?S:load(key);
  if(pbData.pts.length<2){toast('Not enough data to play');return}

  // Sort photos by time for popup
  pbData._sortedPhotos=pbData.photos.slice().sort(function(a,b){return a.ts-b.ts});
  pbData._shownPhotos={};

  pbIndex=0;
  playing=true;
  lastVehicleType='';
  lastBearing=0;
  $('playbar').classList.add('show');
  $('bottomBar').style.display='none';
  $('pbPlay').textContent='⏸';

  // Clear existing path, show animated
  pathLine.setLatLngs([]);
  markers.forEach(function(m){myMap.removeLayer(m)});
  photoMarkers.forEach(function(m){myMap.removeLayer(m)});

  // Trail glow line (behind the main path)
  if(pbTrailLine)myMap.removeLayer(pbTrailLine);
  pbTrailLine=L.polyline([],{color:'#60a5fa',weight:8,opacity:.15}).addTo(myMap);

  // Animated path line
  if(pbAnimLine)myMap.removeLayer(pbAnimLine);
  pbAnimLine=L.polyline([],{color:'#60a5fa',weight:4,opacity:.8}).addTo(myMap);

  // Animated vehicle marker — start with a pin
  if(pbAnimMarker)myMap.removeLayer(pbAnimMarker);
  var startIcon=makeVehicleIcon('📍',36,0);
  pbAnimMarker=L.marker([pbData.pts[0].lat,pbData.pts[0].lng],{icon:startIcon,zIndexOffset:1000}).addTo(myMap);

  myMap.setView([pbData.pts[0].lat,pbData.pts[0].lng],15);
  tick();
}

function tick(){
  if(!playing||!pbData)return;
  if(pbIndex>=pbData.pts.length){
    pausePlayback();
    toast('Playback complete');
    return;
  }
  renderFrame();
  pbIndex+=speeds[speedIdx];
  pbTimer=setTimeout(tick,80);
}

function renderFrame(){
  if(!pbData||!pbData.pts[pbIndex])return;
  var idx=Math.min(pbIndex,pbData.pts.length-1);
  var pt=pbData.pts[idx];

  // Calculate speed and direction from previous point
  var mph=0;
  var bearing=lastBearing;
  if(idx>0){
    var prevPt=pbData.pts[idx-1];
    mph=calcSpeed(prevPt,pt);
    var newBearing=calcBearing(prevPt,pt);
    // Only update bearing if actually moving (avoid jitter when stationary)
    if(mph>0.5)bearing=newBearing;
  }
  lastBearing=bearing;

  // Get vehicle type based on speed
  var v=getVehicle(mph);

  // Update vehicle icon if type changed
  if(v.icon!==lastVehicleType||Math.abs(bearing-lastBearing)>15){
    pbAnimMarker.setIcon(makeVehicleIcon(v.icon,v.size,bearing));
    lastVehicleType=v.icon;
  }

  // Move marker
  pbAnimMarker.setLatLng([pt.lat,pt.lng]);
  myMap.panTo([pt.lat,pt.lng],{animate:true,duration:.2});

  // Draw path up to this point
  var coords=pbData.pts.slice(0,idx+1).map(function(p){return[p.lat,p.lng]});
  pbAnimLine.setLatLngs(coords);
  pbTrailLine.setLatLngs(coords);

  // Update time and speed display
  $('pbTime').textContent=fmtTime(pt.ts);
  $('pbMph').textContent=mph>0.5?Math.round(mph)+' mph':'';

  // Progress bar
  var pct=Math.min(100,(idx/(pbData.pts.length-1))*100);
  $('pbFill').style.width=pct+'%';

  // Check for stops at this time
  var curPlace='';
  pbData.stops.forEach(function(s){
    if(pt.ts>=s.t0&&(!s.t1||pt.ts<=s.t1))curPlace=s.name||'Stop';
  });
  $('pbPlace').textContent=curPlace||(mph>0.5?v.label:'');

  // Show stop markers as we pass them
  pbData.stops.forEach(function(s,i){
    if(pt.ts>=s.t0&&!s._shown){
      s._shown=true;
      var sic=L.divIcon({className:'',html:'<div style="width:24px;height:24px;border-radius:50%;background:#7c3aed;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.4)">'+(i+1)+'</div>',iconSize:[24,24],iconAnchor:[12,12]});
      var m=L.marker([s.lat,s.lng],{icon:sic}).addTo(myMap);
      markers.push(m);
    }
  });

  // Show photos as we reach them
  pbData._sortedPhotos.forEach(function(ph){
    if(pt.ts>=ph.ts&&!pbData._shownPhotos[ph.id]){
      pbData._shownPhotos[ph.id]=true;

      // Show photo popup
      $('popupImg').src=ph.d;
      $('popupMeta').textContent=fmtTime(ph.ts);
      $('photoPopup').classList.add('show');

      // Add photo marker on map
      var pic=L.divIcon({className:'',html:'<div style="width:26px;height:26px;border-radius:50%;background:#f59e0b;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,.4)">📷</div>',iconSize:[26,26],iconAnchor:[13,13]});
      var pm=L.marker([ph.lat,ph.lng],{icon:pic}).addTo(myMap);
      photoMarkers.push(pm);

      // Pause briefly to show photo
      if(playing){
        playing=false;
        $('pbPlay').textContent='▶';
        setTimeout(function(){
          $('photoPopup').classList.remove('show');
          playing=true;
          $('pbPlay').textContent='⏸';
          tick();
        },2500);
      }
    }
  });
}

function pausePlayback(){
  playing=false;clearTimeout(pbTimer);
  $('pbPlay').textContent='▶';
}

function resumePlayback(){
  if(!pbData)return;
  playing=true;
  $('pbPlay').textContent='⏸';
  $('photoPopup').classList.remove('show');
  tick();
}

function stopPlayback(){
  pausePlayback();
  $('playbar').classList.remove('show');
  $('bottomBar').style.display='';
  $('photoPopup').classList.remove('show');
  if(pbAnimMarker){myMap.removeLayer(pbAnimMarker);pbAnimMarker=null}
  if(pbAnimLine){myMap.removeLayer(pbAnimLine);pbAnimLine=null}
  if(pbTrailLine){myMap.removeLayer(pbTrailLine);pbTrailLine=null}
  // Reset stop markers
  if(pbData)pbData.stops.forEach(function(s){delete s._shown});
  pbData=null;
  lastVehicleType='';
  lastBearing=0;
  renderDay();
}

// Double-tap playback bar close
$('pbTime').addEventListener('dblclick',stopPlayback);

/* ── Summary ── */
$('summaryBtn').addEventListener('click',function(){
  var key=dateKey(viewDate);
  var data=(key===today())?S:load(key);
  $('statsOv').classList.add('show');
  $('statsDate').textContent=viewDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  $('statsGrid').innerHTML='<div class="sc"><div class="v">'+toMi(data.dist)+'</div><div class="l">Miles</div></div><div class="sc"><div class="v">'+data.stops.length+'</div><div class="l">Stops</div></div><div class="sc"><div class="v">'+data.photos.length+'</div><div class="l">Photos</div></div>';

  var html='';
  data.stops.sort(function(a,b){return a.t0-b.t0}).forEach(function(s){
    var dur=s.t1?s.t1-s.t0:0;
    var phs=(s.pIds||[]).map(function(id){return data.photos.find(function(p){return p.id===id})}).filter(Boolean);
    html+='<div class="stop-card"><div class="icon">'+(phs.length?'📷':'📍')+'</div><div><h4>'+(s.name||'Stop')+'</h4><p>'+fmtTime(s.t0)+(s.t1?' - '+fmtTime(s.t1):'')+' &middot; '+fmtDur(dur)+'</p>'+(phs.length?'<div class="photos">'+phs.map(function(p){return'<img src="'+p.d+'" onclick="DT.lb(this.src)">'}).join('')+'</div>':'')+'</div></div>';
  });
  if(!data.stops.length)html='<div style="text-align:center;padding:20px;color:#333;font-size:.82rem">No stops recorded for this day</div>';
  $('stopsList').innerHTML=html;
});
$('closeStats').addEventListener('click',function(){$('statsOv').classList.remove('show')});

/* ── Calendar ── */
var calMonth=new Date(); // current month being viewed in calendar

$('calBtn').addEventListener('click',openCalendar);
$('dateLabel').addEventListener('click',openCalendar);

function openCalendar(){
  calMonth=new Date(viewDate);
  renderCalendar();
  $('calOv').classList.add('show');
}

$('calPrevM').addEventListener('click',function(){calMonth.setMonth(calMonth.getMonth()-1);renderCalendar()});
$('calNextM').addEventListener('click',function(){
  var now=new Date();
  if(calMonth.getFullYear()>now.getFullYear()||(calMonth.getFullYear()===now.getFullYear()&&calMonth.getMonth()>=now.getMonth()))return;
  calMonth.setMonth(calMonth.getMonth()+1);renderCalendar();
});

function renderCalendar(){
  var y=calMonth.getFullYear(),m=calMonth.getMonth();
  $('calTitle').textContent=calMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  var firstDay=new Date(y,m,1).getDay();
  var daysInMonth=new Date(y,m+1,0).getDate();
  var todayKey=today();
  var viewKey=dateKey(viewDate);

  var html='';
  // Empty cells before first day
  for(var i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';

  for(var d=1;d<=daysInMonth;d++){
    var dt=new Date(y,m,d);
    var key=dt.toISOString().slice(0,10);
    var isFuture=dt>new Date();
    var data=null;
    var hasData=false,hasPhotos=false,hasStops=false;

    if(!isFuture){
      try{var raw=localStorage.getItem('dt_'+key);if(raw){data=JSON.parse(raw);hasData=data.pts&&data.pts.length>1;hasPhotos=data.photos&&data.photos.length>0;hasStops=data.stops&&data.stops.length>0}}catch(e){}
    }

    var cls='cal-day';
    if(hasData)cls+=' has-data';
    if(key===todayKey)cls+=' today';
    if(key===viewKey)cls+=' selected';
    if(isFuture)cls+=' empty';

    var dots='';
    if(hasData)dots+='<span class="dot-path"></span>';
    if(hasPhotos)dots+='<span class="dot-photo"></span>';
    if(hasStops)dots+='<span class="dot-stops"></span>';

    html+='<div class="'+cls+'" data-date="'+key+'"'+(isFuture?' style="opacity:.3;cursor:default"':'')+'><span class="d-num">'+d+'</span>'+(dots?'<div class="d-dots">'+dots+'</div>':'')+'</div>';
  }

  $('calGrid').innerHTML=html;

  // Attach click handlers
  var days=document.querySelectorAll('.cal-day:not(.empty)');
  days.forEach(function(el){
    el.addEventListener('click',function(){
      var key=this.getAttribute('data-date');
      if(!key)return;
      var parts=key.split('-');
      viewDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
      updateDateLabel();
      stopPlayback();
      renderDay();
      $('calOv').classList.remove('show');

      // Auto-play if the day has tracking data
      var data=load(key);
      if(data.pts.length>=2){
        setTimeout(startPlayback,400);
      }
    });
  });
}

/* ── Lightbox ── */
window.DT={lb:function(src){
  var el=document.createElement('div');el.className='lightbox';
  el.innerHTML='<img src="'+src+'">';
  el.onclick=function(){el.remove()};
  document.body.appendChild(el);
}};

/* ── Init ── */
initMap();

})();
